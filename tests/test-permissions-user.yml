name: Test user-level and enterprise permissions
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          app-id: "123456"
          private-key: "fake-private-key"
          permission-custom-properties-for-organizations: "read"
          permission-email-addresses: "read"
          permission-enterprise-custom-properties-for-organizations: "read"
          permission-followers: "read"
          permission-git-ssh-keys: "read"
          permission-gpg-keys: "read"
          permission-interaction-limits: "read"
          permission-profile: "write"
          permission-starring: "read"
          permission-team-discussions: "read"
      - name: Assert action ran with user and enterprise permission inputs
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step was reached with user and enterprise permission inputs"
