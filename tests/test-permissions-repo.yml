name: Test repository-level permissions
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          app-id: "123456"
          private-key: "fake-private-key"
          permission-actions: "read"
          permission-administration: "read"
          permission-checks: "read"
          permission-codespaces: "read"
          permission-contents: "read"
          permission-dependabot-secrets: "read"
          permission-deployments: "read"
          permission-environments: "read"
          permission-issues: "read"
          permission-metadata: "read"
          permission-packages: "read"
          permission-pages: "read"
          permission-pull-requests: "read"
          permission-repository-custom-properties: "read"
          permission-repository-hooks: "read"
          permission-repository-projects: "read"
          permission-secret-scanning-alerts: "read"
          permission-secrets: "read"
          permission-security-events: "read"
          permission-single-file: "read"
          permission-statuses: "read"
          permission-vulnerability-alerts: "read"
          permission-workflows: "write"
      - name: Assert action ran with repository permission inputs
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step was reached with repository permission inputs"
