name: Test basic usage with client-id and permissions
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          client-id: "fake-client-id"
          private-key: "fake-private-key"
          repositories: "repo1,repo2"
          skip-token-revoke: "true"
          github-api-url: "https://api.github.com"
          permission-actions: "read"
          permission-administration: "read"
          permission-artifact-metadata: "read"
          permission-attestations: "read"
          permission-checks: "read"
          permission-codespaces: "read"
          permission-contents: "read"
          permission-custom-properties-for-organizations: "read"
          permission-dependabot-secrets: "read"
          permission-deployments: "read"
          permission-discussions: "read"
          permission-email-addresses: "read"
          permission-enterprise-custom-properties-for-organizations: "read"
          permission-environments: "read"
          permission-followers: "read"
          permission-git-ssh-keys: "read"
          permission-gpg-keys: "read"
          permission-interaction-limits: "read"
          permission-issues: "read"
          permission-members: "read"
          permission-merge-queues: "read"
          permission-metadata: "read"
      - name: Assert action ran (may fail due to fake credentials)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "success" ] || [ "${{ steps.action.outcome }}" = "failure" ]; then
            echo "PASS: action executed"
          else
            echo "FAIL: action did not execute"
            exit 1
          fi
